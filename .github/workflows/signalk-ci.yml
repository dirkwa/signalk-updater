# ─────────────────────────────────────────────────────────────
# SignalK Plugin CI
#
# Calls the shared SignalK reusable workflow which tests this
# plugin across Linux x64, Linux arm64, macOS, and Windows.
# Node 24 only; integration tests disabled (this plugin is a
# thin-shell redirect — the heavy lifting lives in the peer
# engine container and is tested there).
# ─────────────────────────────────────────────────────────────

name: SignalK Plugin CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      test-command:
        description: Command to run tests
        required: false
        default: npm test
        type: string
      build-command:
        description: Command to build the plugin
        required: false
        default: npm run build --if-present
        type: string
      format-check-command:
        description: 'Optional blocking format check, e.g. npm run ci-lint'
        required: false
        default: ''
        type: string
      coverage-command:
        description: 'Optional coverage command (replaces the test run)'
        required: false
        default: ''
        type: string
      node-versions:
        description: 'JSON array of Node versions, example: ["24"]'
        required: false
        default: '["24"]'
        type: string
      enable-armv7:
        description: Run armv7 (Cerbo GX) tests via QEMU
        required: false
        default: false
        type: boolean
      enable-signalk-integration:
        description: Start SignalK server and install plugin for integration testing
        required: false
        default: false
        type: boolean
      signalk-server-versions:
        description: 'JSON array of signalk-server versions for integration testing'
        required: false
        default: '["latest"]'
        type: string

jobs:
  # ── Automatic runs (push / pull request) ──────────────────
  test-plugin-auto:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
    with:
      test-command: npm test
      build-command: npm run build --if-present
      # Block PRs on prettier/eslint drift in repo-root files like
      # .coderabbit.yaml that aren't covered by the build step's tsc.
      format-check-command: npm run ci-lint
      node-versions: '["24"]'
      enable-armv7: false
      enable-signalk-integration: false

  # ── Manual runs (workflow_dispatch with custom inputs) ────
  test-plugin-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
    with:
      test-command: ${{ inputs.test-command }}
      build-command: ${{ inputs.build-command }}
      format-check-command: ${{ inputs.format-check-command }}
      coverage-command: ${{ inputs.coverage-command }}
      node-versions: ${{ inputs.node-versions }}
      enable-armv7: ${{ inputs.enable-armv7 }}
      enable-signalk-integration: ${{ inputs.enable-signalk-integration }}
      signalk-server-versions: ${{ inputs.signalk-server-versions }}
