name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run ci-lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
